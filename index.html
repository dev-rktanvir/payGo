<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PayGo</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body class="outfit-font bg-black">

  <!-- Main Section -->
  <main class="max-w-md bg-base-200 mx-auto h-screen px-6 flex flex-col justify-center">
    <!-- Logo Part -->
    <div class="flex flex-col items-center relative">
      <img src="assets/bg.png" alt="">
      <img class="absolute top-10" src="assets/Group.png" alt="">
    </div>

    <!-- Login Part -->
    <div class="-mt-36 z-10">
      <form class="bg-white rounded-3xl p-8 flex flex-col gap-4">
        <label class="font-medium text-base text-secondary" for="">Mobile Number</label>
        <input class="rounded-4xl px-5 py-4 bg-base-200" type="text" placeholder="Enter Your Number" inputmode="numeric" maxlength="11" name="" id="mobile-number" value="01680523960">

        <label class="font-medium text-base text-secondary" for="">4 Digit Pin</label>
        <input class="rounded-4xl px-5 py-4 bg-base-200" type="password" placeholder="Enter 4 Digit Pin" maxlength="4" required name="" id="pin-number" value="1234">

        <button id="login-btn" class="bg-primary text-white rounded-4xl px-5 py-3 font-semibold text-xl cursor-pointer"
          type="submit">Login</button>
      </form>
    </div>
  </main>
  <!-- Script -->
  <script src="/src/js/login.js"></script>
</body>

</html>
